# Coverage intent for BobLib.Vehicle classes.
#
# status:
#   direct   - a test fixture primarily targets this model/function.
#   parent   - exercised through a larger test fixture.
#   partial  - partial/base class exercised by concrete descendants.
#   deferred - no stable fixture yet; reason documents the known gap.

