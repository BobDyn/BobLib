name: BobLib CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      full_modelica:
        description: "Run the full OpenModelica release gate"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip PyYAML pytest ruff

      - name: Lint Python checks
        run: make lint

      - name: Run Python tests
        run: make test-python

      - name: Check Modelica formatting
        run: make modelica-lint

  modelica-smoke:
    name: OpenModelica Smoke
    runs-on: ubuntu-latest
    container: openmodelica/openmodelica:v1.26.3-ompython
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.full_modelica)
    needs: python

    steps:
      - uses: actions/checkout@v6

      - name: Install Python test dependency
        run: python3 -m pip install --upgrade pip pytest

      - name: Translate standard smoke models
        run: make modelica-smoke

  modelica-release:
    name: OpenModelica Release Gate
    runs-on: ubuntu-latest
    container: openmodelica/openmodelica:v1.26.3-ompython
    if: github.event_name == 'workflow_dispatch' && inputs.full_modelica
    needs: python

    steps:
      - uses: actions/checkout@v6

      - name: Install Python test dependency
        run: python3 -m pip install --upgrade pip pytest

      - name: Translate standards and all test fixtures
        run: make modelica-translation

      - name: Check Modelica initialization baselines
        run: make modelica-initialization

      - name: Run physical validation baselines
        run: make modelica-physics

      - name: Run signal-level regressions
        run: make modelica-regression
